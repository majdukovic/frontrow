# Toggle the Force-Error switch to 5xx, then verify the events list shows the error state.
appId: app.frontrow.qa
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: 'screen.events'
    timeout: 60000

- tapOn:
    id: 'tab.debug'
- assertVisible:
    id: 'screen.debug'
- scrollUntilVisible:
    element:
      id: 'debug.forceError.5xx'
    direction: DOWN
- tapOn:
    id: 'debug.forceError.5xx'

- tapOn:
    id: 'tab.events'
- extendedWaitUntil:
    visible:
      id: 'events.errorMessage'
    timeout: 10000
