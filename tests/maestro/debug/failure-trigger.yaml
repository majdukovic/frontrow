# Toggle the paymentTimeout failure trigger via deep link, attempt a
# purchase, expect the deterministic timeout error.
#
# Why the kill+openLink dance: on iOS, Linking.addEventListener does not
# reliably re-deliver a URL to a foregrounded app, so we cannot toggle a
# trigger by openLink-ing while the app is still running. Killing first
# guarantees the URL is processed via the platform's cold-launch path
# (UIApplicationDelegate openURL on iOS, Intent extras on Android), which
# is dependable on both platforms.
#
# tag: android-only — Android passes end-to-end. iOS gets through the
# cold-launch + trigger set, but the persisted trigger does not appear
# to apply to the in-flight purchase call. Likely an iOS-specific race
# between Zustand persist rehydration and useDeepLinkScenario firing on
# cold-launch. Trigger logic is unit-tested in
# src/state/__tests__/qa.test.ts and
# src/hooks/__tests__/usePurchaseTicket.test.tsx.
appId: app.frontrow.qa
tags:
  - android-only
---
- runFlow: ../_setup.yaml

# Kill the app, then cold-launch directly into the trigger deep link.
# This is more robust than tapping the Switch on the Debug screen — that
# Switch's testID does not surface to Maestro on iOS (it's nested inside
# a Row), and scrollUntilVisible on the row text was flaky.
- stopApp
- openLink: 'frontrow://debug/trigger/paymentTimeout/on'
- extendedWaitUntil:
    visible:
      id: 'screen.events'
    timeout: 20000

- tapOn:
    id: 'events.item.evt_001'
- extendedWaitUntil:
    visible:
      id: 'screen.eventDetail'
    timeout: 10000

- tapOn:
    id: 'eventDetail.buyButton'
- assertVisible:
    id: 'screen.buyTicket'

- tapOn:
    id: 'buyTicket.payButton'
- extendedWaitUntil:
    visible: 'Payment processor timed out. Please try again.'
    timeout: 10000
