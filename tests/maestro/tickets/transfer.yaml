# Transfer a ticket to a known FrontRow recipient (friend@frontrow.app).
# Also covers the validation paths: invalid email + recipient not found.
#
# tag: android-only — the transferError <Text> now renders unconditionally
# (height/opacity-hidden when empty) which is a real iOS improvement,
# but RN <Modal> on iOS still hides inner testIDs from Maestro's
# accessibility tree. Validation logic stays unit-tested in
# src/api/services/__tests__/tickets.test.ts.
appId: app.frontrow.qa
tags:
  - android-only
---
- runFlow: ../_setup.yaml

- tapOn:
    id: 'tab.myTickets'
- assertVisible:
    id: 'screen.myTickets'

- tapOn:
    id: 'myTickets.item.tkt_001'
- extendedWaitUntil:
    visible:
      id: 'screen.ticketDetail'
    timeout: 5000

# Each test case opens the modal fresh — Maestro's tapOn places the
# cursor wherever the tap landed (often mid-string), and eraseText
# deletes from cursor backward. Reopening guarantees a clean input.

# 1. invalid email format
- tapOn:
    id: 'ticketDetail.transferButton'
- tapOn:
    id: 'ticketDetail.transferEmailInput'
- inputText: 'not-an-email'
- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard
- tapOn:
    id: 'ticketDetail.transferSubmitButton'
# Match by text — iOS Modal sometimes drops testIDs from conditionally
# rendered children (the error Text only renders when transferError != null).
- extendedWaitUntil:
    visible: 'valid email'
    timeout: 5000
- tapOn:
    id: 'ticketDetail.transferCancelButton'

# 2. valid format but unknown recipient — reopen modal for clean input.
- tapOn:
    id: 'ticketDetail.transferButton'
- tapOn:
    id: 'ticketDetail.transferEmailInput'
- inputText: 'nobody@example.com'
- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard
- tapOn:
    id: 'ticketDetail.transferSubmitButton'
- extendedWaitUntil:
    visible: 'No FrontRow user'
    timeout: 5000
- tapOn:
    id: 'ticketDetail.transferCancelButton'

# 3. valid recipient — reopen, type, submit.
- tapOn:
    id: 'ticketDetail.transferButton'
- tapOn:
    id: 'ticketDetail.transferEmailInput'
- inputText: 'friend@frontrow.app'
- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard
- tapOn:
    id: 'ticketDetail.transferSubmitButton'

- assertVisible: 'Ticket transferred'

# After transfer the ticket disappears from the demo user's list.
- assertVisible:
    id: 'screen.myTickets'
- assertNotVisible:
    id: 'myTickets.item.tkt_001'
