# Trigger onboarding then bail with the Skip button.
appId: app.frontrow.qa
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: 'screen.events'
    timeout: 20000

- openLink: 'frontrow://debug/replayOnboarding'

- assertVisible:
    id: 'screen.onboarding'
- tapOn:
    id: 'onboarding.skipButton'

- extendedWaitUntil:
    visible:
      id: 'screen.events'
    timeout: 10000
