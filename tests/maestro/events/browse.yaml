# Browse the events list, search by query, open an event, return.
appId: app.frontrow.qa
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: 'screen.events'
    timeout: 30000

# Search filters the list
- tapOn:
    id: 'events.searchInput'
- inputText: 'Aurora'
- extendedWaitUntil:
    visible:
      id: 'events.item.evt_002'
    timeout: 10000

# Clear search
- tapOn:
    id: 'events.searchInput'
- eraseText
- extendedWaitUntil:
    visible:
      id: 'events.item.evt_001'
    timeout: 10000

# Open detail. Wait for animation to settle on iOS where the keyboard
# focus transition can defer the tap by a frame or two.
- tapOn:
    id: 'events.item.evt_001'
- waitForAnimationToEnd:
    timeout: 5000
- extendedWaitUntil:
    visible:
      id: 'screen.eventDetail'
    timeout: 10000
- assertVisible:
    id: 'eventDetail.buyButton'

# Back to list
- back
- assertVisible:
    id: 'screen.events'
