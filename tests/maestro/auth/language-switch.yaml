# Switch the app locale through Settings → Language and confirm a
# translated label appears on the events tab.
appId: app.frontrow.qa
---
# Sign in via fast-boot so the Profile screen shows the full
# settings list (settingsButton only renders when signed in).
- runFlow: ../_setup.yaml

- tapOn:
    id: 'tab.profile'
- scrollUntilVisible:
    element:
      id: 'profile.settingsButton'
    direction: DOWN
    timeout: 5000
- tapOn:
    id: 'profile.settingsButton'
- assertVisible:
    id: 'screen.settings'

- tapOn:
    id: 'settings.languageRow'
- assertVisible:
    id: 'screen.settings.language'

# Switch to Japanese.
- tapOn:
    id: 'settings.language.ja'

- assertVisible:
    id: 'screen.settings'

# Switch back to English so subsequent flows see the default copy.
- tapOn:
    id: 'settings.languageRow'
- tapOn:
    id: 'settings.language.en'
